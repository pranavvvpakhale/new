<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Spark Electronics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div id="loader">
    <div class="spinner"></div>
    <p>Powering up Spark Electronics...</p>
  </div>

  <main class="login-wrapper">
    <section class="login-card">
      <h1>Spark Electronics</h1>
      <p class="login-subtitle">Sign in to explore smart deals on gadgets you love.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required minlength="6">

        <button type="submit" class="btn primary-btn">Login</button>
      </form>

      <p class="signup-text">
        New user?
        <a href="#" aria-label="Sign up option">Create an account</a>
      </p>
      <p class="login-note">Use any valid email and password to login.</p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
